<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="css/estilo.css" />

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />

    <title>PetShop Amicão</title>
  </head>

  <body>
    <header>
      <h1>PetShop Amicão</h1>

      <nav>
        <a href="index.html">Home</a>
        <a href="cadastro.html">Cadastro</a>
        <a href="produtos.html">Produtos</a>
        <a href="servicos.html">Serviços</a>
        <a href="contato.html">Contato</a>
      </nav>
    </header>

    <div class="container mt-4">
      <h2>Bem-vindo a petshop amiga do seu pet!</h2>

      <!-- CARROSSEL -->
      <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="imagens/pets felizes.png"
              width="200"
              height="600"
              class="d-block w-100"
              alt="Imagem de pets felizes"
            />
          </div>

          <div class="carousel-item">
            <img
              src="imagens/Banho_Cachorro.png" 
              width="500"
              height="600"
              class="d-block w-100"
              alt="Banho em cachorro"
            />
          </div>

          <div class="carousel-item">
            <img
              src="imagens/Produtos_Petshop.png"
              width="200"
              height="600"
              class="d-block w-100"
              alt="Produtos petshop"
            />
          </div>
        </div>

        <button
          class="carousel-control-prev"
          data-bs-target="#carouselExample"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>

        <button
          class="carousel-control-next"
          data-bs-target="#carouselExample"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>

    <footer>
      <li><p>Autor: William Guterres</p></li>
    <li><p>Email: <a href="mailto:contato@amicaopetshop.com">contato@amicaopetshop.com</a></li></p></li>
    <li><p>Telefone: (51)3330-3030</p></li>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
